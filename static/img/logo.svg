<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 248 72" width="248" height="72" role="img" aria-label="GrabBite">
  <title>GrabBite</title>

  <!-- Utensils mark (red, same as the header fa-utensils brand icon) -->
  <g transform="translate(16,8)">
    <!-- Fork -->
    <g fill="#ff4757">
      <rect x="17" y="24" width="6" height="26" rx="3"/>
      <rect x="12.25" y="12" width="3.5" height="14" rx="1.75"/>
      <rect x="16.75" y="12" width="3.5" height="14" rx="1.75"/>
      <rect x="21.25" y="12" width="3.5" height="14" rx="1.75"/>
      <rect x="12.25" y="22" width="12.5" height="4" rx="2"/>
    </g>
    <!-- Spoon -->
    <g fill="#ff4757">
      <rect x="37" y="24" width="6" height="26" rx="3"/>
      <ellipse cx="40" cy="16" rx="7" ry="9"/>
    </g>
  </g>

  <!-- Wordmark (red, bold, tight tracking — matches the header brand text) -->
  <text x="84" y="47" font-family="'Poppins','Inter',Arial,sans-serif" font-size="32" font-weight="800" letter-spacing="-0.6" fill="#ff4757">GrabBite</text>
</svg>
