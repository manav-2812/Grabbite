<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 232 72" width="232" height="72" role="img" aria-label="GrabBite">
  <title>GrabBite</title>
  <defs>
    <!-- Brand red gradient (matches the gb-red accent in theme.css) -->
    <linearGradient id="gbBrand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6b6b"/>
      <stop offset="0.55" stop-color="#ff4757"/>
      <stop offset="1" stop-color="#e53935"/>
    </linearGradient>
    <!-- Top gloss for a premium, glassy finish -->
    <linearGradient id="gbGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Icon mark -->
  <g transform="translate(8,8)">
    <rect x="0" y="0" width="56" height="56" rx="16" fill="url(#gbBrand)"/>
    <rect x="0" y="0" width="56" height="56" rx="16" fill="url(#gbGloss)"/>

    <!-- Fork -->
    <g fill="#ffffff">
      <rect x="17" y="22" width="6" height="28" rx="3"/>
      <rect x="12.25" y="10" width="3.5" height="14" rx="1.75"/>
      <rect x="16.75" y="10" width="3.5" height="14" rx="1.75"/>
      <rect x="21.25" y="10" width="3.5" height="14" rx="1.75"/>
      <rect x="12.25" y="20" width="12.5" height="4" rx="2"/>
    </g>

    <!-- Knife -->
    <g fill="#ffffff">
      <rect x="35" y="22" width="6" height="28" rx="3"/>
      <path d="M35.5 22 L35.5 12 Q35.5 8 40 8 Q40.5 15 40 22 Z"/>
    </g>
  </g>

  <!-- Wordmark (matches navbar brand: red, bold, tight tracking) -->
  <text x="76" y="47" font-family="'Poppins','Inter',Arial,sans-serif" font-size="32" font-weight="800" letter-spacing="-0.6" fill="#ff4757">GrabBite</text>
</svg>
