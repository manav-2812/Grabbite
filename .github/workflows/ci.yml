name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: "Test — Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install production dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dev / test dependencies
        run: pip install -r requirements-dev.txt

      # ── 4. Create CI environment file ─────────────────────────────────────
      #   - SQLite in-memory: no PostgreSQL service needed
      #   - TESTING=1: disables rate limiter, dev admin seeding, etc.
      - name: Create .env for CI
        run: |
          echo "SECRET_KEY=ci-test-secret-key-not-for-production" >> .env
          echo "FLASK_ENV=testing"                                 >> .env
          echo "FLASK_DEBUG=0"                                     >> .env
          echo "DATABASE_URL=sqlite:///:memory:"                   >> .env
          echo "TESTING=1"                                         >> .env

      # ── 5. Verify the app imports cleanly ─────────────────────────────────
      - name: Verify app imports
        run: python -c "from app import app; print('✅ App imported — blueprints:', list(app.blueprints.keys()))"

      # ── 6. Run the full test suite ─────────────────────────────────────────
      - name: Run tests
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      # ── 7. Upload coverage artifact (Python 3.11 only) ────────────────────
      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
