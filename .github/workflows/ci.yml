name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Build & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # ── Environment ──────────────────────────────────────────────────────
      - name: Create .env for CI
        run: |
          echo "SECRET_KEY=ci-test-secret-key-not-for-production" >> .env
          echo "FLASK_ENV=testing"                                 >> .env
          echo "FLASK_DEBUG=0"                                     >> .env
          echo "DATABASE_URL=sqlite:///:memory:"                   >> .env
          echo "TESTING=1"                                         >> .env

      # ── Verify imports ────────────────────────────────────────────────────
      - name: Verify project imports
        run: python -c "import app; print('✅ app imported successfully')"

      # ── Run tests ─────────────────────────────────────────────────────────
      - name: Run smoke tests
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

      # ── Upload coverage (optional) ────────────────────────────────────────
      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7
