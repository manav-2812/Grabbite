{% extends "owner/base.html" %}
{% block title %}Restaurant Profile{% endblock %}
{% block page_title %}Restaurant Profile{% endblock %}

{% block content %}
<div style="max-width:720px;">
  <div class="section-card">
    <div class="section-card-header">
      <h3>{{ restaurant.name }}</h3>
      <span style="font-size:.8rem;color:#9ca3af;">Editing profile</span>
    </div>
    <div style="padding:28px;">
      <form method="POST" enctype="multipart/form-data" style="display:flex;flex-direction:column;gap:20px;">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

        {% if restaurant.image %}
        <div>
          <img src="{{ food_image_url(restaurant.image) }}" alt="{{ restaurant.name }}"
               style="height:120px;border-radius:14px;object-fit:cover;width:100%;">
        </div>
        {% endif %}

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div>
            <label style="font-weight:700;font-size:.88rem;display:block;margin-bottom:6px;">Restaurant Name *</label>
            <input type="text" name="name" required value="{{ restaurant.name }}"
                   style="width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.95rem;outline:none;font-family:inherit;">
          </div>
          <div>
            <label style="font-weight:700;font-size:.88rem;display:block;margin-bottom:6px;">Phone</label>
            <input type="text" name="phone" value="{{ restaurant.phone or '' }}"
                   style="width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.95rem;outline:none;font-family:inherit;">
          </div>
        </div>

        <div>
          <label style="font-weight:700;font-size:.88rem;display:block;margin-bottom:6px;">Address</label>
          <input type="text" name="address" value="{{ restaurant.address or '' }}"
                 style="width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.95rem;outline:none;font-family:inherit;">
        </div>

        <div>
          <label style="font-weight:700;font-size:.88rem;display:block;margin-bottom:6px;">Description</label>
          <textarea name="description" rows="3"
                    style="width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.9rem;outline:none;font-family:inherit;resize:vertical;">{{ restaurant.description or '' }}</textarea>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;">
          <div>
            <label style="font-weight:700;font-size:.88rem;display:block;margin-bottom:6px;">Cuisine Type</label>
            <input type="text" name="cuisine_type" value="{{ restaurant.cuisine_type or '' }}"
                   style="width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.9rem;outline:none;font-family:inherit;">
          </div>
          <div>
            <label style="font-weight:700;font-size:.88rem;display:block;margin-bottom:6px;">Min Order (₹)</label>
            <input type="number" name="min_order" value="{{ restaurant.min_order or '' }}" min="0"
                   style="width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.9rem;outline:none;font-family:inherit;">
          </div>
          <div>
            <label style="font-weight:700;font-size:.88rem;display:block;margin-bottom:6px;">Delivery Time (min)</label>
            <input type="number" name="delivery_time" value="{{ restaurant.delivery_time or 30 }}" min="5"
                   style="width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.9rem;outline:none;font-family:inherit;">
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div>
            <label style="font-weight:700;font-size:.88rem;display:block;margin-bottom:6px;">Opening Time</label>
            <input type="text" name="opening_time" value="{{ restaurant.opening_time or '' }}"
                   placeholder="e.g. 10:00 AM"
                   style="width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.9rem;outline:none;font-family:inherit;">
          </div>
          <div>
            <label style="font-weight:700;font-size:.88rem;display:block;margin-bottom:6px;">Closing Time</label>
            <input type="text" name="closing_time" value="{{ restaurant.closing_time or '' }}"
                   placeholder="e.g. 11:00 PM"
                   style="width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.9rem;outline:none;font-family:inherit;">
          </div>
        </div>

        <div>
          <label style="font-weight:700;font-size:.88rem;display:block;margin-bottom:6px;">Update Cover Image</label>
          <input type="file" name="image" accept="image/*" style="font-size:.88rem;">
        </div>

        <div style="display:flex;gap:12px;padding-top:8px;border-top:1px solid #f3f4f6;">
          <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Changes</button>
        </div>

      </form>
    </div>
  </div>
</div>
{% endblock %}
